services:
  freqtrade_volume_hunter:
    image: freqtradeorg/freqtrade:stable
    container_name: chacal_volume_hunter
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - "./user_data:/freqtrade/user_data"
      - "../strategies:/freqtrade/user_data/strategies"
    # Port 8081 para no chocar con otros bots en la misma red
    ports:
      - "8081:8081"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/chacal_volume.sqlite
      --config /freqtrade/user_data/configs/config_volume.json
      --strategy ChacalVolumeHunter_V1

  freqtrade_hyperopt_bull:
    image: freqtradeorg/freqtrade:stable
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - "./user_data:/freqtrade/user_data"
    command: >
      hyperopt
      --config /freqtrade/user_data/configs/config_volume.json
      --strategy ChacalVolumeHunter_V1
      --hyperopt-loss SharpeHyperOptLoss
      --timerange 20260301-20260325
      --epochs 100
      -j -1
